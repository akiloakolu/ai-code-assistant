<!DOCTYPE html>
<html>
<head>
    <title>AI Code Assistant</title>
</head>
<body>
    <h1>AI Code Assistant</h1>

    <form method="POST">
        <textarea name="prompt" rows="5" cols="60" placeholder="Ask a coding question..."></textarea><br><br>
        <button type="submit">Generate</button>
    </form>

    <h2>Response:</h2>
    <pre>{{ response }}</pre>
</body>
</html>
